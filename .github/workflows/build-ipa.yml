name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS app bundle
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p /tmp/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app /tmp/ipa/Payload/
          cd /tmp/ipa
          zip -r GPT.ipa Payload
          echo "IPA_PATH=/tmp/ipa/GPT.ipa" >> $GITHUB_ENV

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: GPT-unsigned-ipa
          path: /tmp/ipa/GPT.ipa
