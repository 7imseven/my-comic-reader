name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Analyze code
        run: flutter analyze

      - name: Build iOS (unsigned)
        run: flutter build ios --no-codesign --debug

      - name: Create IPA from build
        run: |
          mkdir -p /tmp/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app /tmp/ipa/Payload/
          cd /tmp/ipa
          zip -r GPT.ipa Payload
          rm -rf Payload
          echo "IPA_PATH=/tmp/ipa/GPT.ipa" >> $GITHUB_ENV

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GPT-unsigned-ipa
          path: /tmp/ipa/GPT.ipa
          compression-level: 0
